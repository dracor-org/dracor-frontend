name: Deployment

on:
  workflow_call:
    inputs:
      host:
        required: true
        type: string
      deploy-path:
        required: true
        type: string
    secrets:
      deploy-key:
        required: true
      deploy-user:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"
      - name: Restore node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: ./version.sh
      - run: git describe --tags --dirty --always
      - run: pnpm install
      - run: |
          echo "VITE_DRACOR_GUIDELINES=/odd.html" >> "$GITHUB_ENV"
          echo "VITE_SITEMAP_URL=/doc/sitemap.json" >> "$GITHUB_ENV"
          echo "VITE_WITH_RAHTZ_PRIZE=yes" >> "$GITHUB_ENV"
          echo "VITE_DRACOR_LEGACY_API=/api/v0" >> "$GITHUB_ENV"
      - run: pnpm build
      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.deploy-key }}

      - name: Deploy to ${{ inputs.host }}
        run: |
          rsync -rlvz --delete \
            --exclude=doc \
            --exclude=previews \
            --exclude=robots.txt \
            --exclude=schema.rng \
            --exclude=dracor.sch \
            --exclude=ontology.xml \
            --exclude=odd*.html \
            --exclude=google*.html \
            -e 'ssh -o StrictHostKeyChecking=no' \
            build/ \
            ${{ secrets.deploy-user }}@${{ inputs.host }}:${{ inputs.deploy-path }}/
